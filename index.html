<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Keysha Website</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#334155);
      background-size:400% 400%;
      animation:bg 12s ease infinite;
    }

    @keyframes bg{
      0%{
        background-position:0% 50%;
      }
      50%{
        background-position:100% 50%;
      }
      100%{
        background-position:0% 50%;
      }
    }

    .container{
      width:90%;
      max-width:900px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      width:100%;
      padding:50px;
      border-radius:30px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.1);
      text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);

      animation:muncul 1.2s ease;
    }

    @keyframes muncul{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .profile{
      width:150px;
      height:150px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid #38bdf8;
      margin-bottom:25px;

      transition:0.4s;
    }

    .profile:hover{
      transform:scale(1.08) rotate(3deg);
      box-shadow:0 0 30px #38bdf8;
    }

    h1{
      font-size:3rem;
      color:white;
      margin-bottom:10px;
    }

    h1 span{
      color:#38bdf8;
    }

    .typing{
      color:#cbd5e1;
      font-size:1.2rem;
      margin-bottom:25px;
    }

    p{
      color:#e2e8f0;
      line-height:1.8;
      margin-bottom:30px;
      font-size:1rem;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    button{
      padding:14px 28px;
      border:none;
      border-radius:15px;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .btn1{
      background:#38bdf8;
      color:black;
    }

    .btn1:hover{
      transform:translateY(-5px);
      box-shadow:0 0 25px #38bdf8;
    }

    .btn2{
      background:transparent;
      border:2px solid #38bdf8;
      color:white;
    }

    .btn2:hover{
      background:#38bdf8;
      color:black;
      transform:translateY(-5px);
    }

    .social{
      margin-top:35px;
      display:flex;
      justify-content:center;
      gap:20px;
    }

    .social a{
      color:white;
      font-size:1.5rem;
      transition:0.3s;
      text-decoration:none;
    }

    .social a:hover{
      color:#38bdf8;
      transform:scale(1.3);
    }

    @media(max-width:700px){

      .card{
        padding:35px 25px;
      }

      h1{
        font-size:2.2rem;
      }

      .typing{
        font-size:1rem;
      }

      .profile{
        width:120px;
        height:120px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <img 
      class="profile"
      src="https://i.imgur.com/6VBx3io.png"
      alt="Profile">

      <h1>Halo, Aku <span>Keysha</span> 👋</h1>

      <div class="typing">
        Student • Gamer • Football • Future Programmer
      </div>

      <p>
        Selamat datang di website pribadiku.
        Aku suka teknologi, gaming, sepak bola,
        dan sedang belajar membuat website modern.
      </p>

      <div class="buttons">

        <button class="btn1"
        onclick="alert('Makasih udah mampir 😄')">
          Tentang Aku
        </button>

        <button class="btn2"
        onclick="window.open('https://instagram.com/')">
          Instagram
        </button>

      </div>

      <div class="social">

        <a href="#">⚽</a>
        <a href="#">🎮</a>
        <a href="#">💻</a>
        <a href="#">🎧</a>

      </div>

    </div>

  </div>

</body>
</html>
